name: so_khach
description: Salenote — Sổ Sale Cá Nhân. Chăm khách, ghi đơn, biết tiền.
publish_to: 'none'
version: 2.3.1+8

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.3.2
  path: ^1.9.0
  intl: ^0.18.1
  share_plus: ^10.0.0
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  crypto: ^3.0.3
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  flutter_timezone: ^1.0.8
  pdf: ^3.11.1
  printing: ^5.12.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/anh.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/anh.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/logo.png
    - assets/images/anh.png
    - assets/images/splash_screen.png
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
